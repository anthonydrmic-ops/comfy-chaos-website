<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Comfy Chaos</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#05060c" />
<link rel="icon" href="assets/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" href="assets/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cyan:#22c7f5;--blue:#3b6bff;--violet:#6d3cf2;
    --grad:linear-gradient(135deg,var(--cyan) 0%,var(--blue) 45%,var(--violet) 100%);
    --bg:#05060c;--ink:#f2f5ff;--ink-2:#b7c0dc;--ink-3:#8791b0;
    --panel:rgba(255,255,255,.03);--brd:rgba(140,160,255,.12);
    --font:'Inter',system-ui,sans-serif;--display:'Space Grotesk',var(--font);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;
    display:grid;place-items:center;text-align:center;padding:24px;overflow:hidden;position:relative}
  .aura{position:fixed;inset:0;z-index:-1;pointer-events:none}
  .aura::before,.aura::after{content:"";position:absolute;border-radius:50%;filter:blur(90px);opacity:.5}
  .aura::before{width:560px;height:560px;top:-200px;right:-140px;background:radial-gradient(circle,rgba(34,199,245,.4),transparent 68%)}
  .aura::after{width:560px;height:560px;bottom:-220px;left:-160px;background:radial-gradient(circle,rgba(124,58,237,.4),transparent 68%)}
  .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  img.mark{width:120px;height:auto;margin:0 auto 30px;display:block;filter:drop-shadow(0 14px 40px rgba(59,107,255,.4));animation:float 7s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  h1{font-family:var(--display);font-weight:700;font-size:clamp(3.4rem,12vw,6rem);letter-spacing:-.02em;line-height:1}
  h2{font-family:var(--display);font-weight:500;font-size:clamp(1.1rem,3vw,1.5rem);margin-top:10px}
  p{color:var(--ink-3);margin-top:14px;max-width:44ch}
  a.btn{display:inline-flex;align-items:center;gap:9px;margin-top:32px;padding:14px 28px;border-radius:99px;
    font-weight:600;background:var(--grad);color:#fff;box-shadow:0 10px 30px rgba(75,87,240,.45);transition:transform .16s}
  a.btn:hover{transform:translateY(-2px)}
  @media(prefers-reduced-motion:reduce){img.mark{animation:none}}
</style>
</head>
<body>
<div class="aura"></div>
<img class="mark" src="assets/logo-mark.png" alt="Comfy Chaos" />
<h1 class="grad">404</h1>
<h2>A little too much chaos.</h2>
<p>The page you're looking for doesn't exist — or has moved. Let's get you back to clarity.</p>
<a class="btn" href="./">← Back home</a>
</body>
</html>
